name: Daily Momentum Update

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron is UTC. 21:30 UTC is after the 4:00 PM
    # America/New_York market close during both EST and EDT.
    - cron: "30 21 * * 1-5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  daily-update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      TZ: America/New_York

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate momentum outputs
        run: python main.py

      - name: Commit updated outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/
          if git diff --cached --quiet; then
            echo "No output changes to commit."
          else
            git commit -m "chore: update daily momentum outputs"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: outputs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
