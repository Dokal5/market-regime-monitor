name: Refresh Watchlist Prices

on:
  workflow_dispatch:
  schedule:
    - cron: "30 13,19 * * 1-5"

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh-watchlist:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Refresh prices
        env:
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
          PRICE_API_PAUSE_SECONDS: "12"
        run: python scripts/update_prices.py

      - name: Evaluate alerts
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/check_alerts.py

      - name: Create pull request with refreshed JSON
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/refresh-watchlist-data
          delete-branch: false
          commit-message: "chore: refresh stock watchlist data"
          title: "chore: refresh stock watchlist data"
          body: |
            Automated watchlist refresh.

            - updates latest prices in `watchlist.json`
            - records any zone-change alert state
          add-paths: |
            watchlist.json
